<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <title>Fieldmap</title>
    <meta name="description" content="Offline field navigation app for Biologic Environmental." />

    <!-- Theme + PWA basics -->
    <meta name="theme-color" content="#1C4A50" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />

    <!-- iOS Safari "Add to Home Screen" support.
         iOS doesn't read theme_color from the manifest, so we duplicate it here. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fieldmap" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the service worker as soon as the page has loaded.
      // The SW caches the app shell so Fieldmap works offline once
      // it has been opened at least once on this device.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Use a path relative to the page so this works whether the app
          // is hosted at "/" (Netlify/Vercel/local) or at a subpath like
          // "/In-field-mapping/" (GitHub Pages project sites).
          navigator.serviceWorker
            .register(new URL('sw.js', document.baseURI).pathname)
            .catch((err) => console.warn('[Fieldmap] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
